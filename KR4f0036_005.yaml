body:
  text: 鐵廬外集卷二溧陽潘天成撰大捷賦皇穹肇開大塊初闢浩浩無垠渾渾靡迹既九野之攸同亦八紘之未畫羣生澹泊而無為百族恬熙以各適上清下寧遐邇悦懌阪泉始起戰爭涿鹿相尋戈㦸懲侮慢以徂征舞干羽而來格易演三年之爻詩歌六月之什赫矣聖皇誕膺寶厯祥彰鳳紀雲霓布而來蘇瑞應龍興霖雨施而無敵創造丕丕之鴻基建立皇皇之偉績我皇上繼世重華智勇天錫游乎詩書之林臻乎仁義之極絶其畔援忘其知識撫民不吐剛而茹柔懷逺不觀兵而耀德湛恩汪濊草木亦欣欣而向榮愷澤覃敷魚鳥亦悠悠而自得教廣菁莪化深樸棫謳吟既遍乎中州弦誦亦聞乎異域幽崖朱垠之表盡屬版圖河源海漘之涯各修貢職惟以文德之綏來不用武功之誅殛其有妄圖不軌窺覬非分逞五技之邪謀當四靈之欽運漫為鴟喙之張敢效螳臂之奮天地不容神人共憤釋此不誅何以為訓於是乎滇黔蠢動天討即加閩越披猖王師是問由是赫赫厥聲殊甸宣揚濯濯厥靈遐荒竦震雕題椎髻悉航海而來賔鑿齒穿胸盡梯山而入覲蠢兹噶爾旦自作不靖陸梁窮僻之郷跋扈邉陲之境天子實深憫其昏迷欲曲全其首領數赦其愆尤累示以恩信夫何㝠頑而不靈終不明夫逆順日肆矯䖍益恣驕横於是乎天子赫然震怒爰整六師乾綱獨㫁宸算無遺陣取五花之勝機出八門之竒餽餉數千里不絶運籌億兆人莫知擇吉齋戒卜築壇壝昭告天地禱祀神祇曵梢星之斾立摩天之旗靄靄卿雲輦扶雙鳯而御世曈曈瑞日輿駕六龍而乗時仗黄鉞以肆伐秉白旄以指麾猛将雲集謀臣雨施劍花爛熳弓影陸離伐巨鼓鏗華鐘殷天動地震雷迅風山靈呵䕶天官影從漠漠黄沙倐爾郊原綺繡炎炎赤澤忽然泉液生香長劍倚天山欃槍夜落輶車馳瀚海魑魅晝藏彎弓待月挿羽凌霜推占太白仰射天狼知妖星之滅有日稔巨猾之數不長師至拖林鳥驚而獸散将臨昭木風激而雷奔盪滌窮荒之穢濁廓清絶塞之祲氛於是乎天子厲兵選将推轂築壇露布告㨗奏凱迴鑾蕃部稽顙道路縱觀羣臣識天顔之喜萬民騰雷動之歡然而天子慎終謹始慮危居安登九重而宵旰撫六合而盤桓未暇煖席又御征鞍統率桓桓之萬騎扈從濟濟之千官軍容更盛兵氣益揚赫赫業業焱焱煌煌朔雪飄颻駐驆鄂爾多斯之地春風澹蕩廵行雲中寧夏之方踵夏后氏泣罪下車軫小民之疾苦效啇先王祝天觧網恤萬姓之災傷遐陬歸命殊俗來王垂髫戴白之民攀轅而卧轍毳幙㫋裘之長上壽而稱觴天子恐煩供億催動金輿欲省轉輸促移玉輅命將出平魯城口批吭而擣虛駕進次狼居胥山逺驚而邇懼焚林火烈必獲亡猿垂天罼張難逃脱妖狐早巳服辜豚犬亦復就捕種類請降部落歸附噶爾旦亡魂怖魄窮獸乏奔突之材解脰陷胞孤雛失奮飛之具雖免防風之顯誅難逭鍼巫之譴怒沙漠永清邊圉孔固於是乎天子凱旋而歌大風羣工賡颺而誦常武馬歸華山之阿牛放桃林之塢韜金戈以虎皮櫜弓矢於太府瑞氣遥連黄道九天增月日之輝榮光上燭紫微八極洗銀河之宇燔柴告天用特格祖饗祀山川分遣賢輔魚麗鵞鸛不作唐宗破陣之歌獸舞鳳儀惟奏虞帝簫韶之舞虎賁之士蹌濟於圜橋將帥之臣雍容於樽俎當修文偃武之時正太和殿告成之日紫宫正乎未央青瑣啟乎宣室制神偉而煇煌狀巍峩而跂翼爰處爰居攸芋攸躋繼天而立極體元以出治於是乎頒寛大之詔施曠蕩之恩賜金錢以酬宿衞錫爵土以樹屏藩義以率祖褒贈臣僚之宗祖仁以率親廕襲勲庸之子孫擷秋實而採春華網羅俊乂探隨珠而剖荆璞搜訪沉淪賑恤閭閻之困乏洗滌岸獄之煩寃春迴寒谷日照覆盆薰風動於舜海甘澤沛乎堯雲體兩大之無私職覆職載卜萬年之有祜允武允文衢歌恭疏巷舞謹聞歌曰於鑠皇師濯征絶域堅無不摧剛無不克震之以威懷之以徳赫赫明明皇猷允塞天子之功恵此萬國治河一孔子繫辭有曰昔者庖犧氏之王天下也仰以觀于天文俯以察于地理于是始作八卦以通神明之徳能通神明之德治水之功始可施地理用察較之觀天文而更難可知矣地之理形于山川之脉絡有分合聚散髙下廣狹起伏隱顯之不同雖不同也寔有端緒可尋如蠶作繭先吐一絲千條萬縷纒綿旋繞毫髪不亂周子所謂一實萬分孔子所謂吾道一以貫之也先天圖艮居西北兊居東南天下之山皆起于崑崙層峯叠嶂連阜重岡環繞天下聚于東南大海之濱餘氣潛行海中而發島嶼交牙盤曲環繞四海之外天下之水發源于崑崙千溪萬壑分流瀠洄總歸東南大海之中周子所謂合萬為一中庸所謂小德川流大徳敦化此天地自然之理也能察地理有不通神明之德者乎大禹𨗳水必先導山故隨山刋木奠髙山大川知山之脉絡則知水之脉絡治之之功可知矣禹貢所書詳于中國外者畧焉班固西域傳云黄河源出崑崙潛行地中合葱嶺之水出于闐國合于泑澤復分而岐出即蒲昌海也廣三四百里其水停蓄冬夏不竭去玉門闗三四百里即河之重源渾渾泡泡濆湧有聲已復潛行南出于積石山為中國河也自積石轉北厯蘭州金城寧夏靈州轉東過三受降城内轉南厯榆林府谷神木葭萌之境河之東岸缺保德州又南經朝邑華隂渭水入焉河之東岸缺過雷首山乃折而東至孟津縣孟津以上多循山麓河不為害孟津以下兩岸平濶河勢漸漲而潰决矣又東經開封府原武縣至大名府經濬縣滑縣又東北經開州又北經臨清州清河縣又東經德州又東經景州滄州入海此黄河水之脉絡也崑崙山脉發南一支至積石謂之南山厯西傾至太華熊耳外方即中岳嵩山至于桐柏嵩山之脉落平洋厯開封歸德至徐州起芒碭諸山又落平洋隱伏于無形至南旺分水龍王廟奔洪過山東起泰山盡于海濱八百里勞山餘氣潛入海中結諸島嶼此黄河南境山之脉絡也崑崙山脉北發一支過葱嶺雪山東轉入玉門嘉峪起甘肅祈連諸山北轉賀蘭東轉三受降城起燕然中抽一支向南厯大同起五臺山南一支發太行山北一支起恒山至碣石太行恒山之脉發于平地若顯若隱若斷若續盤屈于太河之濱此黄河北境諸山之脉絡也合觀黄河南北諸山之脉絡則知黄河之源流脉絡出入髙下停蓄險隘平濶聚散歸宿之形而治河之功可施矣故禹貢書𨗳水必先書𨗳山也梅勿菴先生曰欲興水利必先觀諸山形勢脉絡斷續起伏以察地之理而後水利可興也凡遇平洋脉絡斷伏處尤宜細察以地形窪下土力疎薄過脉處細嫩常被水之衝擊而决也不當豫有以防之乎豫有以防之為力易矣先生治河策十篇第一發明賈讓上中下三策第六明器用之利第七詳防堤之法第八審衝决之勢第十論水學之要今擇其尤禆實用者五篇梓以行世治河二治河之策莫要於沿河郡邑各興水利使水勢有所分不全注於河而有衝突潰冒之患也且旱澇有備嵗書大有蓄積饒多禮義興可以享長治久安之業矣嘗考漢書崑崙葱嶺南山北山峯巒挿漢兩山之間廣者千餘里狹者數百里秋冬積雪堅氷春夏始化奔放於河易致泛濫古人謂之桃花水也尤可患者春月寒煖不常雪化而復成氷氷解而猶未化湧起奔騰如山如岳頃刻千里如崩崖裂石衝擊兩崖隄防單弱安能禦乎若使上流寧夏河套皆興水利屯田疏通漢唐二渠堅築隄岸立水門西河注東河洩桃花水勢有所分矣陜西之水皆東注於河渭汭灃涇滻灞俱疏鑿築堤如鄭白二渠以備旱潦沃野千里可以粟支十年矣山西之水莫大於汾合諸水西注於河若興水利耕作不失時矣至於河南伊雒瀍澗河北濟沇淇漳雖有變遷大勢無異於古若諸小水可資灌溉者古多設閘壩啟閉若加修理大河南北諸水不至令注於河矣泛濫潰决之患不亦可免乎若直𨽻天下㑹歸之地山東各省通衢舟車往來百貨駢集水利不興連朝隂雨一望汪洋道路不通數月旱乾赤地千里農民懸耜可勿患乎且直𨽻山東諸水多與地平不若兩江兩廣浙閩湖廣以人力戽水轉於數仞之上可見直𨽻山東水利當興尤易興也况土田肥美物産豐殖風氣㑹聚人才衆多富而教教而益富不將化及於無窮己乎或者曰修各省水利所費不貲何所取辦抑知河决塞之費亦不貲若修水利河不至决以塞河之費修之且藉以賑飢兩利俱存也古人有云水利之大者官修之水利之小者民修之田主出食佃客出力農隙興工寛以數十年積漸修之亦易為力也嵗嵗豐穰不必議蠲議賑為利多矣惟視力行何如耳富而教教而益富此誠長治久安之業也治河三禹導河自積石至碣石入於海河之兩岸皆有山脉相聮以界之與淮隔絶風馬牛不相及也自秦始皇决黄河灌大梁地脉始傷至隋煬帝開汴河達江都河淮始合然河之大勢猶北歸於海也至宋熙寧時河决澶淵而分北清河入海南清河入淮河流猶有所分為患未甚至元建都燕京漕東南數百里粟以實京師賈魯排河全合於淮北流遂絶河失其性衝突潰决為患甚矣决而塞塞而决河决而漕不通淮决而河不通然則欲通漕必治河欲治河必治淮故固髙堰以治淮刷清口以治河而漕始通也古人治河惟去其害後人治河欲收其利此其所以難也然固髙堰又豈易言哉淮之上流有七十二山河又潁水渦河淝水濠水泗水澮漴潼等五河洪澤阜陵萬家等諸湖俱滙於淮之東岸僅以區區髙堰障之又豈易固者哉故古人作外隄以備淮水髙三十二尺修六壩以備蓄洩又於王澗張福二口築堤置減水二閘淮溢則縱之外出黄溢則遏其内侵又於清口併力築堤捍使淮無所出黄無所入使全淮畢趨清口㑹於大河而河與漕俱治矣然僅能塞之而不知疏以分其勢濬以去其淤欲求塞而不决其可得乎必於黄淮入海之處多疏支河以分其勢又聞淮揚長老云前明時嘗備海冦釘暗椿於海口久而未去泥沙淤塞以致河流停滯河底日髙行且駕淮安城而上之矣豈不危乎必去海口暗椿水深時以數舟繫輪鋤隨流上下轉輪而鋤之輪鋤法如小車施軸施鐵齒輻輳于軸如農田耙狀繫一于舟尾繫各一于舟兩旁此江寧孝亷韓斗南所制比古人金龍戯水法較善使泥沙隨流而去不致停滯水涸時用肩爬踏鍤起泥設機發之於岸使河日深堤日髙法用濶鍤使兩人各以一足踏之以手扳之起土用肩爬一人挽之一人推之設機架繫竹兠如魚罾狀發之以築堤河之深濶即為堤之髙廣水循山脉奔趨於海淮安之脉東厯廟灣以下龜䝉之山峙焉餘氣入海中起獨山八里又下起雲臺山乃黄淮入海之門戶不至衝突潰决則數百里之地常慶安瀾矣治河四今夫固髙堰使全淮之水從清口灌注于河共趨于海所以利漕也于淮揚髙寶以下諸州邑尤有利焉使髙堰不固淮水潰决淮揚以下諸州邑不將為魚乎不必潰决或霖雨連朝淮水暴漲從髙堰六壩漫入射陽諸湖下流不通不能奔放于海即天長邵白橋墅等處亦將泛溢為患而况泰興興化泰州之當下流者乎髙堰之築始于漢末之陳登修治于明初之陳瑄復修于潘季馴季馴築堰長八十里起自武家墩經大小厯阜陵湖周家橋翟壩以捍淮之東侵又淮之北岸有王澗張福二口淮水每從此洩入黄河致淮水力分而清口淤淺且黄水亦從此灌入于淮于是併力築堤使淮無所出黄無所入使全淮畢趨清口㑹于大河以入海而河與漕俱治矣然黄河地脉本髙泥沙停滯清口淤塞淮水不能直入于河阜陵洪澤泛溢而髙堰不能不潰矣此不可不有以疏之濬之也又翟壩在周家橋南二十餘里為山陽盱眙接界長老云周家翟壩長二十五里與髙郵南北金門兩閘西堤四十里相對周橋翟壩决而髙郵南北衝溢無寧時矣愚故曰固髙堰髙寶以下諸州邑尤利也然髙寶以下諸州邑不多疏支河以分殺其勢又安能無害乎古語云防民之口甚于防川當决之使流髙寶以下州邑之地當如江南圩田法或方數里數十里四圍開溝取土築堤溝之深廣即堤之髙濶堤旁植榆桑柘蠟子樹以固堤使水不能衝嚙又有材木絲繭之利焉溝中種菱芡蓮蒲雈葦使水波不揚又有魚蝦食物之利焉外有入海之處循范文正所築之海塘捍門自為啟閉内水暴漲衝開捍門奔放于海潮水泛溢倒閉捍門使不入于内河潮退泥沙積于堤外以成髙埠海濱之人謂之海龍今范公堤外或沙漲數十里數百里初殖菱蘆積久堅實以為村落田疇家備舟楫或河海泛溢居民乘之而避不至渰沒且平日取魚蝦或裝載貿易間有賊冦生發居民欲保身家家自為戰官兵助之無不勝焉此誠永逺之利而終無害者也治河五蓋黄河發源崑崙沿南北山之脈絡經中國北至碣石入海既已畧言其槩矣今大河自陽武縣經開封府城北封邱縣南留縣蘭邱縣河之北岸為長垣縣境又東經儀封縣北河之北岸為東明縣境又東南經睢州考城之北又東南經歸德府之北河之北岸為曹縣界又東為虞城縣及夏邑之北河之北岸為單縣又東為碭山縣之北又東為曹縣之南又東為沛縣之南五十里蕭縣之北又東經靈璧之北睢寧縣之北邳州城南又東經宿遷縣南桃源縣北又東經清河縣南而淮河合焉淮水出河南桐栢山東流信陽州確山縣又東經羅山縣北真陽縣南又東經息縣南光縣北光州北東北流固始縣北又東北流潁川縣南又東流霍邱縣北又東流潁上縣南又東流壽州城北三十里為東西鎮陽鎮也夾淮據險為古來之要津東經懷逺縣南經塗山荆山之間稍折渦水入焉亦淮南津要也又東經鳳陽城北十里濠水入焉濠州向為淮南重鎮以長淮為蔽障也又東經臨淮縣北又東北經五河縣南又東經泗州城南一里盱眙北六里自昔淮水襟束之處戰争所必資也泗州東三十里龜山峙焉乃盤折而北又二十餘里而洪澤阜陵泥墪萬家等三十里湖皆滙于淮水之岸淮水之溢恒在于此又東北經清河縣而合于大河謂之清口亦謂之泗口自古為南北必爭之地焉今黄河奪泗水之流而為黄淮交㑹之衝淮河既受黄河之委輸又為運河之灌注勢不能安流而入海矣由是觀之黄河自崑崙數萬里經中國諸州之地合于淮以入海淮又合七十二山河三十六湖僅以八十里髙堰障而東之回狂瀾既倒淮揚諸縣為衆水所歸衝擊震蕩危乎不危乎上流開溝洫固堰壩下流多開支河以殺河勢可不汲汲乎若稍緩焉淮水暴漲河水奔騰泥沙日淤髙堰潰運河决淮揚諸州縣城郭田廬為巨壑南北之咽喉亦塞矣蓋天下之水未有不以海為歸者黄河北岸減水灞由沐陽安東等處以入海潘季馴減水壩俱建于北岸欲從灌口以入海也當從灌口相其地勢多分支流以入海入海之處既通河淮之水不至泛溢髙堰漕隄俱固運河常通然則開海口治下流不特救淮揚州縣之民實為漕運萬年久逺之計也且今日下流工程當在范公堤上非壩水所到也但于石䃮丁溪開通一二處則浮水漸淺河湖舊形漸露再尋射陽德勝平望喜鵲諸湖舊迹而以閘壩之水引河以歸之再由湖歸河以入新開海條分縷析脈絡分明湯潛庵答孫屺瞻書云即大禹治水不過如此或者曰欲新開海口海水髙于内地寧無倒灌之患乎孫屺瞻為總河廵視海濱謂其斷無此事此不必論崑崙數萬里山川之脈絡也即從桐柏山之一脈至天長縣分水嶺南分一支結揚州沿大江盤曲結泰州如皋通州等處餘氣入海北分一支由盱眙龜山沿髙堰結淮安等處餘氣入海惟髙郵寶應興化居兩支脈絡之間其地勢最低其水入海最易而内水常髙于海也海濱之地所以髙于内地者以范文正公築千里海塘取民稻米糠皮布于堤上海潮進退糠皮沙泥粘漬淤澱漸成髙阜迤邐層疊千有餘里海濱之民謂之海龍即海潮暴漲不至于泛溢内地范公築海塘所以衞内地捍海潮其功不在禹下自宋至今數百餘年堤外海濱沙漲百餘里或數百里如今日通州崇明兩地争沙漲結訟可知也沙漲之地俱如江南圩田法各處開溝築堤立水門以蓄洩而成廬舎田疇其為民生利寧有窮乎邵子觀物吟箋註并圖耳目聰明男子身鴻鈞賦與不為貧因探月窟方知物未躡天根豈識人乾遇巽時窺月窟地逢雷處見天根天根月窟閒來往三十六宫都是春天地陽氣聚於日陽之消長因日之逺近也冬至一陽生為復卦日在赤道南二十四度弱與天㑹天地之心合日光射天地之心而為生物之本黄鐘九寸之管接着陽氣葭灰飛去至十二月日漸北而二陽生正月三陽至四月六陽而為純乾是日近於中國之人也至五月夏至日在赤道北二十四度弱一隂生為姤卦由是而日漸南六月二隂生至十月六隂而為純坤十一月而日復與天㑹可見天地有陽氣而旡隂氣陽消即是隂人心有善而無惡善亡即為惡隂盛而陽自生惡極而善不滅以天地止有陽而人心止有善故探月窟而知物躡天根而識人也其學易之要只在慎獨一念之善為天根而擴充之一念不善為月窟而遏絶之中和致天地位萬物育三十六宫都是春也不但陽盛而生物即隂盛而微陽亦生物生物者天地之心而陽者天地生物之本也所謂大哉乾元萬物資始乃統天陽生物隂從陽而生物以天地有陽而无隂隂亦從陽而有也試看日光射處則明不射處則暗月星皆無光受日之光為光也三十六宫者六十四卦除乾坤坎離中孚頤大過小過八卦不翻餘五十六卦一卦翻兩卦為二十八卦共三十六卦都是春者皆陽氣流行於其中為天地生物之本也春生夏長固為生秋歛冬藏生意内足為次年生物之本可見人物皆生生不已也邵子工夫純熟故能閒吾輩做工夫只要勤勤勤不己自能此圖天人合一乃湯世調梅定九兩先生心法之傳也桐城方明善公子廷尉大鎮公孫中丞孔昭曾孫學士以智元孫田伯位伯素伯有懷及南豐湯惕菴建昌揭子宣諸先生皆如是說凡我同人須熟玩焉劉母楊孺人六十壽序甚矣哉貞烈之性感天地鬼神天地鬼神佑貞烈者至竒也非僅佑貞烈也將以風感百世矣天地鬼神之佑貞烈多矣有必死而不死有死而如不死未有既死而復生死三日夜而復生者此誠古今米創見之事今乃得之於毘陵劉母楊孺人孺人年十八從父觀察公令哲官於西粤㑹平西之亂凡仕楚粤者皆脅降觀察公棄官脫身北歸不及擕其家屬孺人與孀嫂姜氏從母兄匿深山各懷利刄誓不辱既而有木將軍握重兵至粤居觀察舊署有奸徒稔知姜氏國色孺人少艾欲擒以獻媚將軍大索不得無如何於是廹孺人仲兄啗以重利髙爵紿言官吏家屬留者皆㸃名具文書遣歸孺人與嫂喜脫虎口歸故里遂束髪腰裙如罪人狀從母兄就道至中途突有二健婢擁孺人與嫂納緇車中加封鎻孺人與嫂怪之將軍麾下有劉書吏者在旁太息曰二人皆為將軍帳裡人矣孺人與嫂始知為所紿也急索所懷利刃倉猝失之孺人曰雖無刃能無死乎嫂曰然當早為之所孺人曰徐之將軍迎我欲得生者未見將軍而死恐遺累母兄不如見將軍而死於前於是兩人隠忍往比至張樂設饌以待矣將軍下堂迎揭緇車延入席二人具陳苦衷求釋將軍笑而不答二人知將軍不可以誠動遂號慟罵詈不絶將軍終置不顧呼侍者持盛服令更衣漫謂孺人曰汝父官不小乃藍縷若此孺人揮擲之罵曰吾父為官清正囊無半文不若汝輩貪汙剝民自利吾縞衣素裳正清白之素且當此亂離安用盛服為久之孺人自度終不能脫恐激怒將軍反被將軍拘禁不得自由因漸強為歡從容應對稍進飲食將軍謂事必諧遂出理事薄暮不歸二人乗間從後戶出至一荒園將軍所居乃觀察故署也熟悉徑路孺人曰今夜固决死計將安出嫂曰墻髙數仞此處有假山石可登盍踰而墜孺人曰不可墻外多畜獵狗嘗噬殺人吾肉乃飽惡畜乎嫂曰此地有厠絶深盍溺死孺人曰吾香魂乃染臭穢乎遂各解帶自經將軍回張燈入室閴其無人急尋至園中二屍己僵仆在地呼湯藥救治嫂漸蘇而孺人竟不醒將軍猶欲擕其嫂入室頼劉書吏苦諫得己有總兵李某義士也責讓將軍曰楊按察仗節棄官遺家屬於此同官不能救䕶反辱之以死於義安乎將何以對衆軍士且恐在上者聞之不便也將軍慚懼乃發孺人尸及嫂氏於轅門外召母兄領歸治喪具停棺寓中且三日初孺人長兄某嫂姜氏之夫也死十三年矣至是附孺人尸大聲謂母曰二弟非人類家有難不能䕶反獻其妹與孀嫂於人吾今為某神因妹屈死千里来救遍祈衆神今無患矣妹後當生一子四女夀七十有二言畢母啟棺視之孺人手足稍能屈伸舌僵喉腫塞仍不能言養息數月始復常後歸至家父即逐次子孺人適西營劉茂源今嵗辛丑年巳六十矣設帨之辰三吳淮浙諸士作詩古文辭以夀之者不啻疊牀連屋余亦進數言以侑觴焉孺人温柔慈惠出言呐呐今雖老怯怯如弱女回憶面斥强暴從容自縊剛烈果决判若兩人孺人生子梅字公調女四人其長女許字宜興芳圩楊維楨未合卺而夫死奔喪守節貞烈之性人咸嘆為不愧母氏云予於孺人先世德業未及詳嘗閱劉氏家乗始祖真原籍鳳陽同姪洪隨信國公湯和克常州守禦十年子孫遂家焉世襲指揮使十傳至明祚以恩貢為湖州判有惠政熙祚以孝亷為湖廣廵按御史死流冦難贈廷尉謚忠毅綿祚字季延崇禎庚午登賢書授江西永豐知縣流冦十餘萬飄忽而至綿祚召諸生五十餘人集明倫堂告曰吾輩束手以待死乎令各執劍㦸開城門殺入賊營忽疾風迅雷若有天兵數十萬擊賊賊潰奔死者無算城得全緜祚歸至明倫堂力竭端坐而死孺人之夫茂源名宗濂者永豐令曾孫也噫劉氏數百年勲德忠貞天地剛大之氣鍾於男子者尚屬有餘篤生婦若女貞烈純懿以發揚其光天之報施何其厚哉芳圩楊氏祖啟裕公與劉氏祖同為勲臣世婚好故相得益彰也巳於是乎序夢遇馬貞娘記維乙亥春金陵李君欲葬妻邀予相地步出南郊髙座寺前觀音庵後樂度院之西百步許見松竹森森清流曲抱有吉地焉李君訪之里人既成議矣是夜余宿石橋三㑹庵中月明如晝輕風拂幃夢一婦女年可四十餘服飾淡雅佩聲璆然褰帷而入向余再拜余問曰更深漏永何緣至止答曰因先生今日為李君相地恐動吾貞娘之墓故來告耳余問其姓名答曰吾馬湘蘭也余曰馬湘蘭前朝名妓何謂貞娘曰先生知吾為名妓却不知吾之貞烈有衣冠丈夫所不能及者先生博極羣書試觀古今来名公鉅卿俱自謂賢傑一經變故國破君亡反顔事仇生平盡喪人之品誼蓋棺乃定耳余自受湯臨川辱决志從良奈囊槖蕭然有新安陳秀才年少才髙有情人也憐吾落魄以千金買之載吾過蕪闗泊魯江時風月清朗吾倚舷弄笛不意有權貴子尋聲而至知吾為馬湘蘭也遂囑當事願以數千金償秀才秀才忿然作色曰彼倚權貴赫奕奪人所愛斷不能也吾恐禍不測謂秀才曰君年少髙才功名逺大天下多美婦人何故為半百烟花累其身家當熟計之秀才益怒曰吾愛爾多才有情非愛爾貌也去去一錢不受遂别買舟泝流而上權貴子大喜載吾順流而下至黄天蕩啟簾視之銀浪驚翻洴湃拍岸吾心計曰此吾死所可報陳秀才也遂躍入江中權貴子大駭而去吾見有金甲神仗劍而立波濤謂吾曰汝落風塵二十餘年今貞烈如此殊可嘉歎吾使邏卒引見汝夫其行如飛至池陽縣五男鄉烏山峽口見吾夫篷窻對月獨酌孤咏聲帶餘哀意殊落寞聞之不勝愴感忽有負吾入舟吾夫且悲且喜脫其濕衣覆之以衾既而撫吾身如寒鐵大聲呼之瞑目不動始知吾死矣與舟人計之新安山路﨑嶇喪柩難至遂載至金陵棺衾殯歛擇𦵏此地余聞其言肅然起謝曰吾過矣吾過矣貞娘曰非先生過不知也以先生篤實君子聊以苦衷相告耳先生誌之人之是非蓋棺乃定報施之理無論死生天地鬼神自斷然不爽也吾在㝠司嘗見鬼神痛恨有明養士三百餘年理學昌明家絃户誦平時講道論德俱自謂度越古人魏忠賢刀鋸腐餘耳百爾臣工養交持祿義子乾孫百番獻諛吾烟花中無此媚態也李自成匪類嘯聚耳揭竿斬木瞋目一呼封疆大臣無不股慄長驅入都突進宫殿先帝死社稷竭忠殉節不過數人餘則草間求活猶差强人意而反顔事仇者匐伏蛇行稱頌功德吾烟花中無此醜態也且忠孝節㢘如景方楊左諸君子雖受極刑而死神氣不散精魄完固上帝眷寵異于凡世懿躅芳名千載不滅彼奸雄宵小生則萬世遺臭一死之後魂魄亦俱摧散零落孰得孰失必有能辨之者言畢移歩下堦余目送之翩然而去余亦驚寤晨起往髙座寺問一老僧曰初搆觀音庵夢亦如是掘地得數斷磚彷彿所記其槩亦如是余遂同老僧至觀音庵後見土阜頺裂露出一碑以袖拂之知為馬貞娘之墓萬厯乙未年為新安陳某所立也爰筆誌之鐵廬外集卷二
