body:
  text: 鐵廬集卷三溧陽潘天成撰語録一康熙辛丑夏四月先生出手書默齊湯先生訓言付炎抄録曰一生學業盡在此矣湯師之言將一部大學衍義包括已盡我生一事無成只得將業師之道傳之後世天德王道都在內矣去年張岷南問我經濟余録師言蓋為此也汝等勉之復以大學衍義及衍義補二書命炎熟看曰汝等勢不能讀萬卷書矣惟此二書乃人生切要之書全體大用無所不備我與汝父常卧汝家竈前草鋪中講癡話只為天下擔憂為古人擔憂言之不已而相罵罵之不已而相笑或相痛哭余所幸者二十嵗面目至今未改如今與汝等說的還是與汝父說的論易乾卦云程傳以舜言之不過借一人以見意耳事事有乾時時有乾如與人講話未開口時潛也既開口時見也開口後便要乾乾惕厲說到數言後便將語默之節略審一審便是或躍在淵之義到暢所欲言是飛龍也才暢便要收住否則亢龍有悔矣六十四卦皆如是看炎以親老家貧患難叢集不能讀書作文請教先生曰讀書只要體貼到自己身心上作文其餘事也讀聖賢書我與之合者是正面與之反者是反面聖賢正面的緣故看不透只要將反面看反面透則正面透矣至於雙親凍餒亦無可奈何只得漸圖竭力之法我昔日在患難中恨不得做不肖事以養其親雖受杖責亦無可悔但念此身是父母遺體若以患貧之故茍賤不廉是非養親乃辱親也汝今只是得失二字纒擾胸中名不成行不立以空憂而虧實事大非孝也務要立志志定之後無一閒念打攪自然讀得成書又問缺了官糧私債勢必受辱如之奈何先生曰命也安之我無錢還債是該罵的無銀完課是該罰的嗔怪心畏懼心都不是你父母如此盛德又有此貞女弟婦老天自然憐念到了絶處自有逢生之路我一生常常如此不必憂懼先君子於炎娶婦後粘一聫房中曰常向死中求活自然絶處逢生此皆老成經厯之言也炎半生賴之程大夫子見人靜坐便歎善學汝要讀書須令此心常靜乾乾净净不挂一絲不染一塵如天之空如海之濶然後開卷限定課程優游涵泳便有自得處學者不但是人一能之已百之須是已一能之已百之攻破一箇緊要處其他自當迎刃而解問看過義理不記在心當治以何法先生曰以一心去記這義理是分理與心而二之也隨看一理便體認到自己心上行之無間理義自然融貫又曰不可單要記得須要曉得曉得此中意味自然驅遣不去如何㑹忘了人生理義上事發於中之不容已者方能做透若但知得理當如此只得依他做定做不徹真學問只在克養其良心可恨吕晚村說到本心便以為異學如汝弟媳貞女只是本心上打熬不過那箇教他做來或問朱陸往還發明聖學朱子嘗云南渡以來真實理㑹做工夫者惟吾與子靜兩人不知何以紛紛異同至今不决先生曰此兩家門人各挾好勝之心以爭門户耳與二先生無與也今朱陸之書具在細心體認自然明白不可作矮人觀場隨人喜怒先生痛惡詆毁先儒者曰先儒救世各有苦心棄其所短取其所長舜所以成大知也最恨一班浮薄小人借衛道之名以自濟其惡問稼書何以痛詆陽明先生曰稼書躬行頗好而識量不足總由心體不明還是行不著習不察古來了徹心體者不多人其餘都坐此病問六經皆我注腳曰聖人先得我心之所同然者千言萬語不過發明我心之理義豈非六經注我以我心之理義發明六經尊聞行知豈非我注六經方合山曰六經皆我注腳此語最精最妙或以為禪豈非癡人說夢或問格物朱子云格至也窮至事物之理也或云格如格式或又曰格去物欲如格其非心之格陽明曰格正也去其不正以歸於正諸說紛紛何也先生曰皆是也陽明先生善闢二氏道家長生術鍊精氣神陽明曰吾儒慎獨則心定心定則氣靜氣靜則精固精固則神旺何用導引禪家曰戒生定定生慧陽明日吾用戒懼慎獨之功心體自無不明何用參悟可見二氏竊聖人之一端以詭其說而聖人之道固無不該乃有陳建輯皇明通紀言陽明害道把三教打成一滚此皆好為議論不求諸心者之言也湯師嘗以為吠聲之犬職是故耳君子立言總不要自出名目只把四書五經現成話闡明定無流弊論動靜一色炎以為此成德之事初學但可却動以求靜豈能動亦定靜亦定譬如明鏡在此虛靈畢照自然無塵者聖人也初學須以鏡袱蓋之不令生塵先生曰此儒與禪之所以分也禪家之虛虛而無用如鏡袱蓋者要鏡何用鏡袱一去諸塵畢集矣吾儒只有去塵磨鏡之法並無蓋鏡之法塵不能不來漸去漸少久而久之光明照徹無用不靈矣初學雜念昏氣未可強除惟提醒此心察其為塵而去之平平常常勿忘勿助便是真實工夫若有意求虛便是不虛也問讀古人書自已性情者合不來便生懊惱先生曰不可如此須是直養無害方能與之相合只將古人書漸漸引入可也多一惱心便把心體纍壞先生論知行合一云方密之先生曰有行前之知有行時之知有行後之知世人但以行前之知為知故以合一為疑耳此最淺者非知至之知也方先生之言最精到吾心有兩萬物句當體認萬物一體也萬物皆備也炎問二語似一意不須叠舉先生怒曰入耳出口總不細心體認萬物一體當下認出萬物皆備積纍終身時時存得萬物一體之心方做到萬物皆備問課程先生曰早晨背學生書即可用看未發氣象工夫不必勞攘而學生所背之書一字不能欺我此妙訣也天甫明披衣靜坐或背大學聖經或誦二典看聖人氣象其餘自已讀書聽學生讀書都把他喚醒此心要見聖賢當日都是痛哭流涕與我們說孟子言將降大任始讀之不知何為大任後乃知免天下之勞苦空餓拂亂者乃天下之大任也勞苦空餓經厯過乃能生養天下之衆人拂亂經厯過乃能保全天下之象傑命炎曰汝不怕罵要做我學生我學生不易做也沒有張子四願心胸如何擔得大任湯師嘗言學者不要别討箇天理只去得人欲便是天理此語最切近好下手師又云諸賢說話多是匾的如賢賢易色執德不宏等可見只有聖人的而字則字真正妙不可言真是時中也最好見聖人氣象吾輩設心最不好是天理內的人欲此處斷要撇清今人說到富貴孰不以養親為辭然未有不為鄙夫者無志之人為得喪所制定然一事無成科第原不是分外事只要做得舉人進士本領可以安社稷定民人受祿無愧原是為已的事揣摩文字亦所以練習心術至於患得患失之念斷要洗得潔潔净净某在場中文字未完以前我有事也三場既畢以後我無事也飛飛躍躍海濶天空豈不大快活自在若有熱中之態必以無益之思廢有用之日矣奴顔婢膝搖尾乞憐都自這裏去戒之戒之論事親炎曰在婉轉先生曰其心和順乃能婉轉凡百病根總在心不和順拋却心源何處下手汝事老父全要練此和順之心不但性氣不可任道理亦不可執待小人之道接之以誠防之以禮必不可化加以不測之威子曰君子矜而不爭又曰人而不仁疾之已甚亂也君子惡小人斷不可見諸顔面厯代黨禍皆自此也易曰壯于頄有凶君子知此豈至大敗於小人之手問知人之難先生曰要知人只在知己儒者切要之務在成就幾箇後生要天下久安長治先要得好䝉師生平不輕受人恩後日做事方做得開吾生平誓不背毁人吾一生只是一箇倔強摧殘傾覆自幼至老只是不怕古人經理天下任他艱難重大無不處之泰然只是局外閒觀四字看舜禹有天下不與何等心胸問宰相可以小事糊塗否曰非也吕公連小事也不糊塗其內明而外糊塗者真宰相器也不癡不聾做不得家翁其宰相之謂乎做諫官不可做吹毛求疵以直為名的可惜前朝諸君子只管把懷宗痛罵豈不是不怕死的忠臣只是徒死無益於事非惟無益或反害之那諫官沒有宰相識量是做不得的論休休有容之相臣是讀書人本分事不得詫以為竒也到得竿頭更進變無技為有技變小人為彥聖伊尹周公便能如此用兵之道莫妙於詩小戎之師節制最妙余於此有獨得汝且未及知也伐鼓淵淵鼓聲緩緩而起使三軍之氣以漸而作不令咆哮振旅闐闐得勝後緩緩而還若是一時驕譟雖敗兵殘卒可以襲而虜之這兩句真是王者節制之師最妙王者以仁義禮樂行師自然立於不敗之地後世許多權術真無處對敵也最妙是步伐止齊行到六七步住一住腳振頓一番氣不衰神不亂百萬之軍雅靜如許怎生取敗行軍之本在固民心采薇枤杜諸詩豈是口惠必有一畨經理使無內顧之憂其在軍中又與士卒同甘苦軍士如何不死心塌地併力向前諸葛武侯用師全是節制絶不為行險僥幸之計所以有王者氣象觀魏延要取子午谷武侯不肯便見自有左傳以來只兩人實實做來關夫子尊周室嶽夫子攘夷狄非以長於兵法遂謂好左氏春秋也有摘方正學于忠肅二公之短者先生勃然大怒曰如此二公猶好摘其短何用意之薄也天生正學以開一代之節義天生忠肅以救一時之宗社各有不可磨滅處且須竭力學之于公局面太發開了如范希文程明道能自我發之自我收之椒山先生史魚之直也更有邦無道可卷而懷者要之各就資性做成都是世間不可少之人顔子沒而聖學不傳惟濂溪明道近之曾子之學惟諸葛侯傳之諸葛侯生平只是謹慎二字淡泊明志二語曾子的傳也炎曰侯之材知似優先生曰非也只是謹慎二字最難任他經天緯地之才都是謹慎中出吾輩今日都是子貢方人只是見善則從默地做去方好又論古今人物髙下先生曰不必多言只把全部論語反覆熟讀自見各人髙下賢人難學聖人易做聖人老安友信少懷隨時隨地不費一錢便可做得愚夫愚婦合著聖人時甚多只是不著不察耳賢人如華嶽聖人如平地炎問學須循序先學賢後學聖乃其序也先生曰只有學聖一道賢人日學聖但未到耳舍聖而學賢便有流弊吾學聖正學賢也天地有陽而無隂陽退處便是隂人心有善而無惡善退處便是惡問天地山川如此廣大如何體認到心上來先生曰實是一體故也吾與天地山川同其意趣亦同其功用所以中和位育只是全此心體一日晨起隨先生徐步山間清和景象山色葱然其樂殊甚內透心髓先生曰此無私心之驗也人茍無私雖患難中亦見此意淡而不厭人都不解把未發氣象體認自然見得學問最妙是淡後人做工夫都要濃濃者必厭斆學之要只在時習時習之要只在孝弟汝須看得聖賢說話是祖宗留下家私汲汲經理收拾便可享用决不肯為敗家子矣辛丑四月先生歸金陵囑炎曰賢姪天苦汝矣苦汝乎成汝也承前起後在汝一人汝其勉之事親務在先意承志口不言貧汝其志之以上荆溪門人許重炎録語録二讀書之法有體認有體貼有體㑹深淺不同總要字字實體關切身心顔曾方能體㑹子貢亦漸到體㑹處顔子四勿曾子三省都是慎獨二字關頭扼要子思更補出戒慎不睹恐懼不聞工夫更密戒懼是冦未至而備之慎獨是冦方至而禦之也不是兩項詩書禮是不待病至預先守身之法春秋是對症發藥有一病即與一方易經雖千百世後人情利弊無不預先一一勘透雖未有此病皆已備為製方輪扁斫輪見桓公讀書曰此古人之糟粕也此語失之太快其言不疾不徐得心應手數語最妙讀書亦期有得於心耳彼為文詞而已者不僅得古人糟粕哉曾子精察力行顔子博文約禮都是反求諸已吾省吾身博我約我當玩以上宜興門人蔣師韓録鐵廬集卷三
