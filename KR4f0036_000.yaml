body:
  text: 鐵廬集别集類六國朝提要臣等謹案鐵廬集三卷外集二卷國朝潘天成撰天成字錫疇溧陽人寄籍桐城為安慶府學生溧陽志載其幼與父母避讐相失年十五乞食行求遇於江西界百計迎歸傭販以養備極艱苦以其間讀書講業竟為績學年七十四迄窮餓以死瞿源洙集有潘孝子傳與志所言合蓋篤志苦行之士也是集為其門人許重炎所編冠以小傳年譜第一卷為默齊訓言天成述其師湯之錡語也二卷為雜著天成詩文也三卷為語録重炎與蔣師韓記天成語也外集一卷為勿庵訓言天成記其師梅文鼎語二卷為雜著亦天成遺文補刋者天成學問源出姚江以養心為體以經世為用其詩文皆抒所欲言不甚入格然行誼者文章之本綱常者風教之原天成出自寒門終身貧賤而天性真摰人品高潔類古所謂獨行者其精神堅苦足以自傳其文故身沒嗣絶而人至今重之特録其集俾天下曉然知聖朝立教在於敦倫紀厲名節正人心厚風俗固不與操觚之士論文采之優劣亦不與講學之儒爭議論之醇疵也乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書鐵廬集卷首年譜先生諱天成字錫疇别號鐵廬溧陽黃墟潘氏自其髙祖貢貴公以散秩仕雲南卒於其地宗支單弱越再世乃得歸里先生寄籍安慶為郡諸生晚僑寓江寧終焉娶桐城才女盛氏無出妾生子開業先生享年七十四嵗葬江寧聚寶門外惠應寺側順治十一年甲午五月二十六日先生生先生卒於金陵譜牒神主遺書盡失姑即幼所聞於父老暨長所親見者約略志之如左先生祖某業儒未遂恢廓有竒氣當周公蓼洲諱順昌被逮時為販豎護周公北行至白溝河遇孫徴君諱竒逢來迎擁周公授之乃返先生六嵗時父索租歸極言老佃之苦先生聞之戚然不寐終夜輾轉問所以恤老佃者大父喜而撫之曰此范文正公志也兒能志此乎在多讀書耳康熙三年甲辰十一嵗漂落荆溪大父既卒父諱某朴願無知牽入命案為某宦家所愚遂挈家漂落荆溪康熙五年丙午十三嵗被難尋親先生父陷入某宦家無計自脫至是先生乃覺之常懷不平見於辭色先生狀貌英偉頗似虎形顧盼奕奕有光宦家懼遺後患移其父母弟妹於他郡令人誘先生入山樵牧擠之深谷幸其人以實告勸之逺遁先生日夜號泣裸體而行尋訪其父杳無踪跡冬月至池州青陽縣白沙嶺夜無所棲踞古廟壞梁而卧風凄月白虎豹夜遊乃悲歌一律只為尋親離故鄉迢遙不憚路途長晝行孤嶺隨飛鳥夜宿窮山伴虎狼渴飲寒泉饑嚙雪足沾泥水髮披霜幾畨回首無張主獨向西風淚萬行六年丁未十四嵗行遊徽寧萬山中去冬訪知父母所在至則又他移矣叩諸山人絶無可跡先生誓不返顧談星相幸多中藉以糊口聞宣城梅勿菴先生名振衣上謁二十年後梅先生設帳安慶受業稱弟子七年戊申十五嵗遇二親於徽郡先生躑躅萬山無可告語計非遍遊窮山絶谷村落女子間不得遇也乃為販豎以進每至一村落持鼗大呼作溧陽人語山中婦孺聚觀大笑先生母金孺人聞聲而出相持大慟山人來觀者日以百計悲其幼也為之泣下所遇之地大約近江西界八年己酉十六嵗客遊滇南先生訪親時遇劉先生某卜之得吉劉為前朝誠意伯耳孫年六十未娶其所聘婦五十餘矣從其母弟守志滇南至是始通音問劉將就婚滇南欲挈先生作伴先生亦欲以少壯周覽天下名山大川遂從之至西南極邊望㸃蒼大雪諸山之勝九年庚戌十七嵗北遊川陜劉先生訪舊於陜西先生從之行渡瀘水入成都過劒閣棧道北行直抵河套武進許公之漸巡視茶馬先生假其吏衣裝文牒同遊塞外遇中華人張酒肆者從之痛飲訪知西北情形山川險易登賀蘭山極目而返先生之心胸益恢竒不可窘束矣十年辛亥十八嵗返徽郡復出遊假貸辭劉先生歸江南欲迎親歸養而羈繫弗能行也計其歸資非五十金不可先生束手無計乃哭辭其二親誓不得歸聚毋相見也行至某縣手持來牟假磨作糜屑適二富商對奕堂上竒先生貌仰首問先生曰汝識字乎曰然能對句乎曰能乃曰對著牙碁移動一天星斗先生直前對曰獨捱石磨推轉兩象乾坤二商驚絶問所由來欷歔泣下各解其囊贈五十餘金先生持以報二親令弟侍父先歸而侍母挈妹徐徐而發時大冬嚴寒雪深數尺輾轉山谷數百里先生背負行李置前途還抱幼妹扶老母膚裂血流涔涔白雪見者無不流涕除夕宿髙淳固城湖氷堅不得達十一年壬子十九嵗春正月迎親歸溧陽負販養親三月受業於宜興默齊湯世調先生迎二親歸故業蕩然無以為養乃市香為業來往荆溪瀨水間歌吟之聲滿於道路人皆目為狂癡聞默齊先生為古人為己之學謁拜門下稱弟子湯先生舉行髙忠憲公復七規令先生靜坐觀未發氣象三日有得作詩數章一首見前卷十二年癸丑二十嵗市筆養親先生市易細微又抱瘧疾遇陰雨入卧古廟拾白金數星喜曰天賜也既念此人或如余困者不活矣坐守之日將盡果有踪跡之者出金還之是人素張筆肆乃為先生營筆貿易於是遍遊諸名宿間得讀正希陶庵諸名人巨筆所憩之地琅琅端誦興不可遏援筆立就咏歌所志嵗丙辰先生年二十有三先大人愧庵先生年三十有九先生負筆至學舍以文相質先君一見驚絶留信宿叩其所得至性淋漓洞闢千古嘆曰此振古豪傑也遂定交約為兄弟時至茫溪里中兩人共宿竈下卧談經史夜半吹薪作糜談辨不已時相詆訶又相痛哭哭已大笑鄰人怪之常自誦曰未做秀才時便以天下為己任其豪於自立也如此先生自言市筆至建平界傍晚雪甚山麓有茅舍數家舊係姻戚不容宿遂緣嶺而上風雪益急山中諸叫嘯聲隱隱若近頗生怨嗟忽憶李僕射雪夜擒吳元濟故事豪興勃發歌舞而下幾二鼓矣有賽神者門未闔豫僵仆簷下其家急呼酒相救扶至浴盆中乃蘇視余服二單衣耳屢遇竒厄全賴千古在胸乃不為溝中之鬼又曰吾於四書五經之義得於道塗村落間者多矣以未發氣象為之本源以人情物理為之疏導乃知聖賢之言句句是實一開卷時意味逈别先生嘗請於默齊先生曰聖人言忠信篤敬蠻貊可行今市筆養親恐難以忠信也湯子曰子母相權理之常也汝以本錢盤費明白告人始雖未信久則人人悅服不煩詐飾而養親之資自有以處之矣行之數月果然益奉聖人之言為蓍蔡遇黃九煙先生於荆溪從遊至蘇州年月未詳大約市筆時事黃先生諱周星江西潯陽人寄居江寧上元籍崇禎庚辰進士國變隱居往吳門訪徐昭法諱枋前壬午舉人道經吾邑先生遇之荆南山下黃先生老矣攜杖獨行買吾邑茗壺二事先生攜筆囊為黃先生負擔至吳門叩草廬昭法餓不能出門户強起揖客黃先生抱持大哭解囊買米數升鹽少許具粥不能具燈昭法未老幾失明矣先生侍側兩人語多不可曉中夜令先生獨卧兩人對語達旦黃先生素有詩畫名黎明令先生持一扇鬻之戒勿道名氏先生持扇入市顧者輒棄去先生念昭法㕑久空矣售扇可作數日糧乃言曰此黃九煙詩畫也一富人即持白金數星購之先生歸以實告黃先生暨昭法大怒曰孺子殆不足教速持去索扇來還我先生惴惴入市復持扇來黃先生笑曰孺子固當如是越日遣先生先歸庚申年以博學宏詞徴黃先生遂投潯陽江死湯默齊先生哭之以詩十六年丁巳二十四嵗訓䝉養親先君子薦先生於鄉孰孰主疑之先君子曰如負公等吾任其咎先生攝敝衣冠危坐終日嚴寒盛暑晏如也鄰兒有無禮於其母者先生正色叱之其人不服先生大怒去曰吾仍市筆耳此地不可居主人留行甚苦先生約以逆子服罪乃留於是主人共懲鄰兒惴惴屏息不敢復肆二十一年壬戌二十九嵗客遊桐城先生盡心色養艱苦備至數年來父母繼歿弟妹淪喪幾盡所遺幼弟才二齡桐城方有懷先生前學士密之方公諱以智之猶子也來弔姻喪於溧訪竒士可談學者或以先生對方先生即日來訪見先生煢煢在疚意貌非常語之曰君何不挈弟逺遊吾郡乎先生許之既奔湯默齊先生喪葬其二親已畢負幼弟逺涉千里方先生令設帳麴大夫廟以糊其口而與先生窮十三經二十一史之奧先生埋頭十年纂修二十一史紀録傳贊數百卷名曰蠡測方先生曰讀二十一史無他法在句句躬行耳先生愕然方先生曰天下之治亂係君子小人之進退欲治天下之小人先治吾心之小人汝且自思一日之間念念相續或為秦李或為范韓出此入彼正不容髮耳先生奉諸先生明訓力學教人皆以反求諸心為要常自誦曰嚴師容有可欺處惟有吾心不可欺平生得力不可誣也先生連丁內外艱六年不飲酒食肉悲哀過當耳目幾廢徹夜不寐者嵗餘湯先生訓之曰汝父母死矣汝在父母不死也汝死如父母何立身成名顯於後世孝子所以不死其親也先生稍節悲泣專以靜坐讀書為事至是方先生提誨賑給乃得益肆力於明體達用之學三十年辛未三十八嵗補安慶府學生先生素未與童子試至是由望江籍以七藝受知督學時菴許公望江小邑不容入籍攻者洶洶桐城方氏張氏盛氏諸老先生曰池沼中豈能蓄此靈物招入桐城籍遂為府學弟子是嵗娶桐城盛氏盛故名家女貌陋能詩擇壻有年歸先生一月後縱談詩文斂袵行師弟禮終身不敢對席秋中先生歸江南省墓孺人援古誼作四詩送之附見二卷十年不育勸先生娶妾有催粧詩送房詩是時先生館穀頗豐不事生産家從兄曾來居湖㳇遇一匠桐城人極言先生輕財好施扶危濟困之德此下二十餘年知之不詳不敢妄載五十五年丙申六十三嵗訪故友於宜興蓋自盛孺人之卒徙居江寧有年矣江寧當水陸之衡先生欲周知天下疾苦當世英豪而時時放意於石頭城虎踞關之側徜徉潄濯有終老之志先生不到宜邑者二十年炎丱角時先君子摩炎首歎曰未知汝得見竒男子否也至是徒步而來先君子喜極而悲迎謂曰君猶生入此門乎先生笑曰老兄尚在小弟安得死也先君子年七十有九矣炎是時年二十嵗五十七年戊戌六十五嵗江南臬司李公麓山訪先生論學李公諱馥福州人相國文貞公族子也甲子舉於鄉上公車道金陵遇先生於座至是三十五年矣來官金陵遣吏遍訪先生先生居小紫竹林隘巷蓬户罕有識者李公三造其廬皆不遇先生歸持刺入謁閽人見其老而窶也問潘相公何在先生曰我是也閽人且笑且疑而入李公叱曰此乃潘相公也易布衣草履迎諸大門執手恨相見晚先生愕出不意李公呼酒相對具道所以是時李公掌江蘇七府一州生死之命未幾又轉安徽藩司嵗值大計各屬戚戚謀所以賄先生之弟者先生怒斥其弟束裝去之遂至吾邑與門人論學先是浙人詆毁先儒激宕馳驟震動天下儒生俗士競言朱陸異同而性情昧沒名利薰心先生至宜大聲疾呼掃除詞章訓詁之習抉發本心開示藴奧使人曉然於明體達用反已自得之學蓋折𠂻於前輩者多矣六十年辛丑六十八嵗纂録默齊湯先生訓言又著未發氣象說以示後學先生學天官於宜興吳青可先生諱學録明諸生學厯算於宣城梅勿菴先生諱文鼎字定九學史於桐城方有懷先生諱中發號鹿湖論兵於江西揭子宣先生諱暄論道於白鹿洞湯惕庵先生諱來賀前庚辰進士國變後為僧悅服最深者無如默齊湯子默齊經綸世務恢廓周密而潛深伏隩道氣充溢先生歎曰吾奔走數十年遊厯半天下衡量英雄推敲學問終未有駕吾湯師之上者遁世無悶德盛禮恭如吾師者天下一人而已吾老矣無所成恐吾師桑梓後生不識大儒正脉故爾僕僕來此深以吾師心法有望於貴邑人也雍正五年丁未七十四嵗春正月初六日先生卒於江寧先生老而益貧不給衣食癸卯春日炎侍先生於金陵簞瓢蕭索日不舉火間得數錢沽酒脫帽振衣論說世務往往達旦不倦畜一妾竒蠢不能供紉補㸑具同懷弟負氣使酒不省人事仰給於先生先生鶉衣百結倨見豪貴口不言貧家常絶薪冷水供沐絶少生人之樂而興致愈豪嘗曰吾於江山風月飽飫之矣區區飢凍何足困我哉先生教人惟以慎獨為要處困為基樂水樂山為入門之法其所開道即其所自為也至是病卒遺孤十嵗門生故舊富貴者弗問也友人吳官心典衣被備棺衾號哭視斂權厝聚寶門外惠應寺側嗚呼先生死矣血淚萬斛無地可灑竒情浩氣無穴可藏經人生未有之窮竪千古不磨之志嗚呼先生而至於斯誰為為之孰令聽之炎自辛丑冬日執贄門下匆匆拜别總計前後侍教之時未及百日一切經厯之艱遇合之竒聞見之博先生將自注以付炎而惜乎其未及叩也姑即所聞之的然可據者譜其一二以俟有心者之搜補焉雍正七年己酉秋九月重炎百拜謹志乾隆十有一年丙寅夏四月復為訂定如右鐵廬集卷首
