body:
  text: 鐵廬外集卷一溧陽潘天成撰勿菴梅先生訓言先生諱文鼎字定九宣城人湯世調先生之學學人道而合天道梅定九先生之學學天道而合人道兩先生皆天人合一之學也學人道戒懼慎獨自能探月窟而躡天根學天道推算到冬至一陽初生識其天根而躡之推算到夏至一隂初生知其月窟而探之戒懼慎獨自不能己也殆亦明道堯夫復出也歟不推算到冬至一陽初生之天根陽之水木土生萬物何由得而知不推算到夏至一隂初生之月窟隂之火土金化萬物何由得而知董子所謂道之大原出於天天命之謂性一句書終不得而明也故必推算到天根月窟始知隂陽之消長五行之順布化化生生而不窮焉太極動而生陽靜而生隂陽變隂合而生水火木金土以生天地者也天即以隂陽五行之氣化生萬物之形以隂陽五行之理化生萬物之性性有義理之性有氣質之性理一定而氣不齊理無聲無臭氣有形有聲者也無聲無臭者北極居其所也故曰無極而太極有形有聲日月五星之運行也義理之性一定故人皆可為堯舜氣質之性不齊故戒懼慎獨變化有形有聲之氣質以復無聲無臭之天載觀中庸首章與末章可見矣天人合一方是天根月窟閒来往三十六宫都是春也理以數顯數以理神孔子曰參天兩地而倚數數倚參天兩地而起然後觀變於隂陽而設卦發揮於剛柔而生爻窮理盡性以至於命理者無聲無臭上天之載何從得而見也數者有形有象人人可得而見者也以可見之數推不可見之理神明變化從此出矣儒者學厯要知天地生物之心周流無間吾人仁心流行亦周流無間時時刻刻存仁與天地生物之心合孝悌忠信濟人利物之心自油然而生也又要多讀書講究經濟如水利農田禮樂兵刑水火工虞之事事事練達幸而中舉人進士為朝廷大官仁心流行於天下即為一州一邑之長仁心流行於一州一邑即不幸老於畎畝山林著書立說傳諸其人仁心流行於萬世矣先生曰厯象算明則知天地生氣運行不己不特春温夏煖花開栁茂見天地之生氣即霜寒雪凍草枯木落亦見天地之生氣試觀百草枯萎根下勾萌巳發黄葉飄零枝頭嫩綠巳生但人心為氣禀所拘物欲所蔽心之生氣己斷然斷而不絶生機隨處發見須察識擴充如乍見孺子將入井怵惕惻隠充之可以保四海平旦清明好惡近人無牿亡而養之自能生生不己矣問黄石齋先生易洞㡬云自冬至復卦一陽起第一日為初九不逺復排到夏至姤卦一隂起第一日為初六羸豕蹢躅又排到冬至復卦終而復始循環無窮然一年周天三百六十五日四分日之一卦爻三百八十四對減尚餘一十八爻七分先生曰子午兩時甚長夘酉二時亦長以十八爻七分補入則無餘矣一日如此一年亦如此且天地之度數不足卦爻之數有餘此聖人所以贊天地也問天有陽氣而無隂氣陽之消即是隂先生曰試觀日光射處則明不射處則暗可知矣月與衆星皆無光受日之光為光故天地有陽而無隂人心有善而無惡問候管灰自十一月黄鐘之管九寸最長至十月應鐘之管最短是候陽氣不候隂氣也冬至一陽初生於地下為復卦上至地面尚有五重隂氣為隂爻五故天氣極寒而地氣煖井水温開土九寸草木萌芽漸發夏至一隂生於地下為姤卦上至地面尚有五重陽氣為五陽爻故天氣煖地氣寒井水冷草木之滋漸歸於根夏秋露水自草木根上至枝葉桐城盛傳五云云花落而果成至九月剝卦在上爻為碩果無射之管己短十月坤卦純隂剝卦上爻之陽尚在故應鐘之管最短而陽氣接坤之上爻龍戰于野十月為小陽春必有數日東風諸葛孔明精於易理而曰借風英雄欺人語耳故十二月之管皆候陽氣而不候隂氣先生曰然陽氣太亢必有隂氣以濟之隂陽和萬物生又不可偏也黄帝命伶倫取嶰谷之竹作十二管以十二月之管埋於宻室地下實以葭灰薄蘆灰覆以縑素每節氣至則灰飛出朝廷用此布功令伏羲文王周公用此作易禮樂兵農之事從此起天根一念之善要擴充一念之不善要遏絶工夫只在慎獨問周茂叔窻前草不除與自家一般意思先生曰以其象而言之草自根而榦榦而枝枝而葉葉而花花而實以其數而言之一生二二生四四生八八生十六十六生三十二三十二生六十四一部易之象數全矣以其氣而言總是一元之氣自下而上至花實由復卦天根而至純乾一元之氣又上自花實而下歸至於根由姤卦月窟而至純坤以其理而言總是無極而太極周流而不息在我以其象言之與我頭面耳目口鼻手足一般以數而言與我五官百骸一般以氣而言與我一身之氣上下流行一般以理而言與我一心無極而太極周流不息一般窻前之草豈不與我一般意思不獨草木也萬物皆然但人得天地正氣而生頭在上四肢在下草木頭在下尾在上禽獸頭尾横有不同耳故聖人仰觀俯察近取逺取作八卦以通神明之德以類萬物之情問好鳥枝頭亦朋友落花水面皆文章先生曰啼鵑送春鳴鴂迎秋此以隂陽消息之理五行變化之機告我也豈非朋友乎李白桃紅菜黄栁綠飄泊溪池層波蕩漾曲折瀠洄五色掩映豈非文章乎不獨此也凡天地間耳之所聞目之所見孰非朋友文章乎北辰所居衆星旋繞恒星碁布五緯錯綜銀河燦爛烟霞飄渺此天之文章也中國三大幹龍分於一脉中間相去萬里或起或伏到頭彼此環抱天下之水萬派千條總歸於海即數十里之山水忽分忽合曲折頓宕蒼松翠栢細草閑花隨處㸃綴此地之文章也至於地出河圖洛書醴泉器車此以性命象數養生利用之道告聖人之良友也又如景星祥雲膏雨甘露非朋友勸善之道乎山崩水溢谷變陵遷非朋友規過之法乎萬里驅馳學者與衆人同寸心領畧學者與衆人異太史公遨遊名山大川作史記邵堯夫遍厯江湖曰道在是矣大丈夫不讀萬卷書不走萬里路安能作好文章明聖賢之道乎讀二十一史者多讀本紀列傳不讀書誌先生曰書誌乃厯朝制作所在如天文五行可占休咎地理河渠可識幅􅊷廣狹風俗淳漓闗梁阨塞戰守所宜水利農田旱潦蓄洩富民根本賦役食貨可知戶口多寡征徭重輕通商惠工本末資籍兵刑厯律可知國勢强弱民情喜怒可知欽天敬民調元贊化此儒者經濟之實學安可不讀意欲將二十一史書誌另刷一部朝夕講究練達治才雜記訓言後先生父諱士昌字期生號繖䀠處士改革後棄諸生業著有惜隂草繖䀠隨語等書嘗以六十四卦爻與春秋二百四十年行事相比附成書謂之周易麟解經史外尤多該洽且一一期裨實用生四子長即先生也先生年十五補郡博士弟子員順治戊戌繖䀠公捐館先生哀毁骨立而遭家多故生計日窘兩弟俱尚㓜先生拮据承家苦心獨喻不以告人康熙壬寅學使王公同春嵗試拔第一受廩是嵗胡太孺人見背先生同弟爾素公諱文鼐奉湯藥衣不解帶者月餘其時諸弟俱能自立恐食指日繁累先生欲析箸先生固止之不可不得巳於次年分㸑作分㸑說述祖宗創業艱難以互相勉勵所有逋負皆自任之壬子嵗陳孺人棄世遂不復娶念祖父兩世淺土躬自跋涉營求葬地風雨寒暑無間閲數年乃得二穴葬費不貲公貯弗給於用先生舉貸竣事諸弟請均償先生辭曰弟姪俱貧而我勉襄大事實己分當盡何均償為自是子職俱盡遂息意為四方遊知交日廣先生生平善取友所至盡友其善士雖一技一能有微聲者聞其名亦親訪之而於當途薦紳先生必因其來而後往是時有據要津者頗喜延納願締交託友人道意者至再先生終不一往留京師數載名日起漸達禁中裕親王雅好士招致詣府備加禮遇先生因族中祖業為他姓所偪恐先人墳廬不保遄歸里門甲戌族人請主祠政固辭不獲先生念族蕃不教恐難整率乃嚴立條約戒家訟禁賭博抑強暴奬善良興文㑹族中長㓜益習禮教孝友敦睦之風駸駸乎日上矣癸未安溪李公廵撫畿内寓書請梓先生所著厯算叢書遂客上谷數年凡刻諸書七種而厯學疑問三卷安溪視學時已付梓呈御覽䝉特嘉許嵗乙酉上南廵安溪以撫臣迎駕問署中有何人遂以先生姓名對上曰朕久知此人回鑾後可與偕來遂於四月二十日引見於德州龍舫賜坐講論垂問平生所學甚悉隨賜御書扇幅尚御珍饌如是者凡三日以下缺倪觀湖先生别號竹冠以大統厯授先生亦未嘗講貫先生數月而著厯學駢枝馬貴與文獻通考缺厯律先生與弟爾素作厯律考補之先生著書八十六種巳鋟者十數種厯學駢枝厯學疑問商程論籌算筆算尺算平三角舉要􅓡三角舉要塹堵測量勾股測量環中黍尺日月交食九數存古先生嘗製比例尺銘曰數立象呈算因量得何以遊心象先觀萬物之所從出濟南劉魯南名汶曰繇其言以知其藴蓋先生之學於是乎至而非星官厯翁之所得而比絜也先生曰康節天理流行於中心境活潑觀擊壤集可見真千古風流人豪予不能及也至於厯學或可過之非能過康節也有康節開其端繼其緒者多人耳嘗論古聖賢之學至今日而多晦厯學至今日而益精蓋古人舉其要後人盡其詳然終不能出堯典乃命羲和數節也天成深察先生議論處處要天人合一元善之氣暢滿於中庶㡬有康節之遺風焉嘗與諸友論梅先生算法一友問曰孝悌忠信仁義禮智亦用算乎對曰惟不知算故不孝不悌不忠不信不仁不義無禮不智也試想父母生我自三朝彌月週嵗少長請先生教書不知費多少錢財况置田宅以遺我使我安居樂業安得而不孝乎自考童生以至中舉人中進士不知費朝廷多少錢糧况既做官有祿以養我衙役䕶從百姓供應又不知費㡬許也安得而不忠乎兄弟有㡬好朋友有㡬最為難得自然不得不悌不得不信也聞者莫不爽然又曰仁一家者看父母兄弟妻子共㡬何人財之入者㡬何出者㡬何必使仰足以事父母中足以養兄弟俯足以畜妻子可以仁一家矣仁天下者通盤打算戶口多少財賦多少墾田多少山海之利多少上無過取下惟正供彼此均平凶荒有備家給人足教化可興可以仁天下矣義者將天下通盤打算官吏之俸㡬何軍餉㡬何當與者不尅減不當與者不濫與侵漁有禁壅滯須通義可行於天下矣禮有度數有等級費用有多寡豐不過奢儉不至吝禮可行也智則無令利昬將天地古今之理細細推出源流遡源窮流以一為萬遡流窮源合萬為一凡天地古今之事無不算明利弊無利不興無弊不去豈非天下之大智乎聞者莫不悚然然後知梅先生之算法博大而精微矣我梅先生厯象算數之學總要發明天地生物之心以吾人之心與之合一祭梅勿菴先生文維年月日受業門人潘天成謹以生芻一束致奠於勿翁老夫子之靈曰嗚呼痛哉嗚呼痛哉生死存亡之際無不悲喜係之况數百年間氣所鍾之人受數十年教育之益者乎自羲文周孔而後參天兩地倚數觀變隂陽設卦發揮剛柔生爻和順道德而理於義窮理盡性以至於命顔曾思孟得其精藴其餘諸子各得其一體由是漸失其傳髙者流於空虛卑者滯於術數天人之際判而為二漢儒惟董仲舒道之大原出於天發明天命之性諸葛孔明寧靜致逺實操戒懼慎獨致中和之功至於晉魏清談唐人詩賦無足述矣且漢唐以來厯算之學如洛下閎鮮于妄人李淳風之流止能明其數而不能得其所以然之理終非天人合一之學也至宋濂溪著太極通書明天人合一之㫖二程張邵繼其緒朱子集其成宗朱子者徒誦習詞章以為獵取科名之具而不能得其意周程張邵之學晦矣周程張邵之學晦而羲文周孔之所傳者益無從窺其萬一也吾師挺生數百載之後於參兩圓方之數天之不可階而升地之不可尺寸度者器以測之籌以布之度以量之筆以紀之不差毫黍凡觀變隂陽發揮剛柔和順道德窮理盡性隨時隨物觸處洞然以人合天以天合人羲文周孔不傳之秘粲然復明於天下易知簡能一而萬萬而一數日可以啟其端數十年而不能盡其藴天成自齠齔時侍大父側聞鄉先生陳二游稱宣城有梅勿菴先生者得羲文周孔不傳之秘為當世一人心焉慕之十數齡輒履屩屢叩先生之門先生多出遊不一遇既而汝為師引見先生於皖江書院先生憐予自㓜苦心誨之不倦數十年以來凡先生之所得者自無不告之於我而我未能有以盡得也政欲請益求得其所未盡奈何遽舎我而逝也嗚呼痛哉然先生所著之書具在苟能殫心究之其所未盡者庶㡬可以得之况吾師兩孫俱負傑出之才長孫玉汝巳為天子之侍從次孫玉青擢髙科登顯仕直指顧事耳其所遇亦竒將有以發抒吾師之所未竟者曾孫濟濟蘭茁其芽皆王國之瑞遊於夫子之門者雖無如愚之顔子或有真愚之髙柴固多結駟連騎肥馬輕裘之士而尤有捉衿露肘不耻惡衣惡食之徒行道傳道自有人也吾師亦可浩然長往而無憾於九原矣嗚呼尚饗鐵廬外集卷一
