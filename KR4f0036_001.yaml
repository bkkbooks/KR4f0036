body:
  text: 鐵廬集卷一溧陽潘天成撰默齋湯子訓言湯子諱之錡字世調宜典人康熙壬子三月天成年十九嵗因葛公琰茅楚傳兩先生引進拜先生於宜興北門外藍田里即以聖賢勉勵我教我做頂天立地一箇人先生云孟子言人皆可以為堯舜堯舜之道孝弟而已聞汝十三四嵗隻身千里尋親備極艱苦周旋而歸以些須本錢經營於外養父母兄弟孝弟有足稱也此即為聖為賢根本且苦心讀書肩挑重擔一路歌吟此皆古人之所為果能將聖賢之書句句心體力行始終不變又何聖賢之不可為哉勉之勉之又曰子路為親負米非有錢買米負之而歸也不過為人負米得數升腳錢以養親耳汝今做小本生意得微利以養親此亦賢者之所為古人耕養三年通一經拚得十五年五經可通矣只恐不立志蹉跎嵗月而無成耳九月先生命行髙忠憲公復七規看未發氣象有雜念起只默誦喜怒哀樂之未發一句初坐雜念紛起默誦千餘遍雜念漸少第二日雜念漸少而氣昏再靜坐數時昏氣漸散而心漸清矣先生端視吾之顔色謂曰漸得力矣第三日晨起心氣清明若天開日出萬境澄徹焉即作詩數章見後卷先生閲之曰語雖不工而有自得之意若我教你做詩不知費許多力而今頃刻能之可見聖賢道理吾心自有只因氣拘物蔽而不得見耳今袪其物欲澄其昏氣而本體自見朱子所謂明德者人之所得乎天而虛靈而應萬事者也然而先儒有言本體當下了然工夫終身無盡朱子所云學者當因其所發而遂明之以復其初也以後須將四書五經句句體認到身心上來自見聖賢千言萬語總是發明我之一心全體大用無不明矣物格知至明德復其初也問此時一念不起則心靜矣事到面前則念必起心能無動乎先生曰隨其事理之自然而應之念起而無妄也所謂靜固靜動亦靜也動靜因時所謂時止則止時行則行動靜不失其時其道光明程大夫子見人靜坐便歎善學得濂溪主靜立極之旨一傳楊龜山再傳羅豫章李延平教人觀未發氣象默坐澄心體認天理延平傳朱子白鹿洞學規半日讀書半日靜坐後來諸君子一日為三分一分靜坐一分讀書一分應事髙忠憲公靜坐立為復七規蓋取大易七日來復之義也存心從靜坐而入窮理從讀書而入靜坐讀書由朋友講貫而入非天下大福人不能與於此炎聞當時襲好為異之説者羣指默齋先生為禪學玩此一段知其決非禪學矣乃明道先生定性之微指也吾邑吳存庵延湯先生課子勸行復七規吳先生勉從之第一日辰刻炷香趺坐雜念起滅矜持急迫甚不自適第三日上午始覺此心湛然清涼泰然愜適未免心喜明日稍理家務客至應酬頗生厭意遂覺此心作梗不快者一日乃以病告之湯先生先生言不可厭動喜靜事來即應事過即休須使動靜合一乃可吳先生乃悟時止則止時行則行之義意思豁然仍復端坐如髙公所云平平常常默然靜去乃覺此心湛然太虛無復紛擾門潘師嘗為炎極論喜靜厭動之非靜然則師之授受可知已門下晚學生許重炎附記先生曰先儒謂體認聖賢緊要語莫過喜怒哀樂之未發謂之中一句此心便一先儒又謂從衣冠瞻視整飭間此心便在這裡此莫過檢點九容將此心安頓在九容上便是顯微無間五日後遂辭先生出做生意覺宜興城郭山川更換一番景色滿街滿路之人俱是一家痛癢關切見老者行路艱難便要扶持幼兒啼哭便知憐愛素不相識之人同行談講不覺相親見爭名奪利之事不覺羞耻此皆真性發見自然而然者也一路上或背書或作文或以青山緑水涵養其心或以花落鳥鳴怡悅其意風塵之勞苦竟不知也歸家見父母兄弟親愛歡樂更倍於往日矣由是而後此心或明或昧而於先生之教終不忍忘數十年來貧賤困頓艱苦異常而此心不以為苦者皆先生當日之教也論作文之法不可拾人餘唾須要自抒性靈我教你將四書五經從心上體認明白原原本本信筆所之如萬斛泉源隨地湧出與挈瓶汲水者異矣真文章須要真識力不可如猜啞謎者徒逞空談今人作文𠞰襲陳言真所謂拋却自家無盡藏沿門托鉢效貧兒先生常曰學者做工夫須戒慎不睹恐懼不聞臨事時念頭初動關頭扼要尤宜謹慎然非戒懼於不睹不聞此心雜亂昏昧隱微之際動不及覺何能慎獨如鏡塵昏物來難照故戒懼無須臾之間此心精明隱微畢見如鏡無纎塵妍媸悉照兩節工夫原非兩截又云不睹不聞是源頭莫見莫顯是關頭源頭要清關頭要謹又云千古竒文莫過中庸一書慎獨於一心可以致中和而成位育舜為大知不過好問好察執兩用中甚是平常達道達德九經三重皆出於天命之本然而無竒特問格物致知先生曰物有本末朱子曰明德為本新民為未身心意知明德之物也家國天下新民之物也吾究已之意何以不誠而誠之吾究己之身心何以不正不修而正之修之明德之物格也吾究家國天下何以不齊不治不平而齊之治之平之新民之物格也豈止格一草一木哉然格一草一木亦為身心意國家天下也如五穀百草衆木而知其材之用孰非養身心而濟天下乎初學之人必讀真西山大學衍義邱瓊山衍義補以為格物致知之要先生曰人性皆善身心意知本無不修不正不誠不致惟圖私利於己則知不致意不誠心不正身不修矣甚則為倡優盜賊殺身而不顧也天下國家本無不平不治不齊惟不公利於人則家不齊國不治天下不平矣甚至父母兄弟爭財相殺上下征利民窮財盡盜賊蜂起身弒國亡而不顧也故大學一書而以理財終焉理財不是聚財而在生財有大道生之者衆三農生九穀九職任萬民他如士農合一橫經亦負耒民兵合一戈刀之手亦荷鋤也至於僧道遊惰皆驅之南畝矣食之者寡流品當清也冗員當汰也冗役當革也為之者疾使之以時大役不宜輕動也用之者舒九賦九式量入為出冡宰以三十年之通制國用也則財恆足矣然理財必在用人大臣法小臣廉而財始可生也周禮一書理財居其大半掌之者各有其人問理財要道先生曰理財之道在先興水利禹治水而後稷教稼今時之水雖異堯時然大河屢決當水衝者民為魚鱉運道艱阻轉輸不時多因溝洫不治禹盡力溝洫使大河之水有所分泄而渟蓄不至泛濫奔潰旱則可資灌溉賈讓之中策可行中原河北豐收轉輸隨處可通今衛河之迹可尋不至專運東南之粟又三吳之水自溧陽銀林諸閘由宜興而達太湖銀林堰即東壩壩西之水出蕪湖采石壩東之水由溧陽宜興入太湖東壩本金陵來龍過脈本中髙昔伍子胥以吳伐楚開通運糧以後築銀林五堰勢甚單薄宜思患預防又宜興有百瀆湖州有七十二漊皆滙於太湖惟吳淞一道注之於海霪雨連朝山水暴漲能無泛濫乎宜興進士單鍔欲於李禹卿所作太湖之堤作千洞石橋蓄泄太湖之水東坡愛其書上而行之今皆壅塞疏而通之甚便也青龍鎮入海諸口有七十三會曲折宛轉以防海潮沙漲後人不明古人之意一皆直之沙淤江底內不能出外反入矣宜復古法又單錫議墟田築埂埂髙一尺內溝外河皆深一尺田主出糧佃人出力嵗嵗築之埂彌髙而河溝彌深旱潦俱有備矣植榆栁以捍風浪倘有決伐之為帚平時可伐之為薪其利無窮二單之書具在可詳考之時與丁文緒兄於大學衍義中得其略於名臣奏議王圻續文獻通考悉其詳纂得有書湖萬紀美曰向吳淞江設三千淘河夫疏濬淤泥使太之水不致壅阻且習水戰以禦倭寇蘇常二州設水利廳以督之今皆名存而實亡先生又曰理財之道在屯田一曰官屯永樂初著令每一都司另撥旗軍十一名耕種號曰樣田蓋欲據所收籽粒多寡以别嵗之豐凶地之肥瘠軍之勤惰初未嘗以田豫官也始於隆慶二年將宣大屯田開墾成業者每十頃內給官軍五十畝為養廉之資而又令各自行開種若副參不及百頃守備以下不及十頃者參論戒飭原其初意蓋欲將領偏禆等官督率家丁克勤稼穡為士卒倡後則強役部曲占收籽粒如宣大山西諸鎮固帥肆其鯨吞延寧甘固諸鎮蔭職恣其蠶食肥區歸已瘠磽移之軍士久之竄易册籍糧彌不均不得不寄甲於勢要而欺隱日多不得不攤稅於佃軍而包賠愈苦流病相仍人鮮樂耕野多曠土而官屯壞宜為限制總官受田不過二頃副總以下由是為差如郭子儀以河中軍苦乏食乃自耕百畝將佐以是為差士皆不勸而耕京西節度使劉昌亦身率士卒墾田三年而軍有羡食兵械鋭新邊障安寧皆官屯龜鑑也一軍屯明初定制每衛所軍士以三分守城七分屯種又有二八四六一九中平等例皆以田土肥瘠地方衝緩為差蓋即先王寓兵於農之意無事為農有事為軍各衛所無論軍民舍餘雜色但種軍屯即應軍役俾一軍之屯而衆佃者朋出一丁務於農隙之時分番操練則城操之軍不妨調發而即以屯軍代之戍守合天下屯田共六十四萬三千餘頃各處屯軍受田則例多寡不一推算當不下一百二十餘萬人以備戍守便可於城操內挑出一百二十餘萬人以資調發不煩召募不增餉饋而緩急俱有所恃誠國家無形之巨利也頂種者禁其典賣一兵屯明初定制守邊士卒備譏察外令屯田每將以東西五百里為制耕作以時訓練有法遇敵則戰寇去則耕且人共為佃人共為守所墾之田給為永業二年後量照下則起科蓋但求積穀之多則士飽馬騰戰守有備而邊境之士桑麻遍野穀價必平召買既賤運費亦省公私兩利一民屯屯田因兵屯得名則固以兵耕若夫募民耕之而分里築室以居其人又有民自墾蕪不由官募而第為之畫其疆理之數量行起科者謂之民屯宋制兵屯以使臣主之民屯以縣令主之魏了翁疏曰墾田之效多於屯田其言良為有見漢人有徙逺方民以實廣虛之地今恐不可行亦惟善用其勞來之術而已一曰因之一曰利導之一曰整齊之何謂因東坡所謂大荒大祲民輕去其鄉之時也聞畿輔棄田甚多津涿水利無窮即近邊膏腴所在有司加意招徠鼓舞開墾額內者俟三年起科起科分數雖上中之田止照下中則例其農器牛具量行借動庫銀漸續補還如是則人可無流離野可無曠土是之謂因何謂利導倣朝錯拜爵實塞下之意虞集軍官授富民之法能闢五百畝者豫秩視百户等而上之豫秩有差俟三年後以上中下勻算照中則起科邊地仍照下則起科果嵗入如額即給職仍於籽粒之中撥三分之一為月俸幹止既定必許其占籍長子孫得以三途進或疑土著之民不能相容莫如另立屯額或謂若輩非武功何以畀武爵然田墾而食足食足而兵強又何武功之足羡是謂利導何謂整齊令邊腹有司報其所部荒田可開墾者報布政近限三月逺限六月報部一面督率開荒如匿隱不報以不職論獨慮成熟之後或有妄認世業希圖吞霸者惟當開墾時即各屯給帖承掌俾此疆彼界瞭然難混雖有新軍補役逃户復業亦不許告爭有世家豪右強占者必罪不宥是謂整齊雖然勸民急矣勸吏急焉漢王粲謂農益地闢吏受大賞農損地荒吏受大罰一商屯明初計邊地寒又受兵且耕且守力最難乃通商中之鹽以維之令商輸粟邊郡官給之引一引二百五十斤赴鹽所領鹽轉鬻永樂時粟二斗五升得鹽一引商利過當爭趨之各自設保伍督耕於是邊地盡墾而塞下粟充溢露積饒於中土屯軍亦因其保障守望相助得力耕當此之時各鎮軍就其地足給無有所謂太倉年例者閭左自正供外無他賦蒸庶樂業𢎞治中部臣葉淇謂賈人輸薄而獲利厚遂令納銀運司解部部分輸各邊於是商各散歸逐本業營資而故所墾田盡廢邊地米價頓湧一遇災荒即積錢如山金如土而米無從出鹽課不足給重以私鹽盛行官引壅滯倉鈔莫售減價投於囤户資空本壓商皆逃徙若於沿邊荒地有可墾者每商量給填與印信照帖永不起科及米豆入倉之日則酌時估以定斛量飭官額而革常例庶耗費少而輸納無難尤自疏通鹽法始必禁私販於産鹽之地消壅引於行鹽之區又嚴掣摰杜浮課則引鹽無滯倉鈔速售彼執母權子之徒不負耒而樂趨塞下無矣明制直省九邊設衛四百九十三守禦千户所三百五十九額軍三百餘萬居則為守行則為戰修屯不過清舊墾新二事而墾之課效賖不如清之計功實大抵膏腴之區貪併於巨室鄰界之處侵奪於豪強各處有司細將魚鱗老册與屯田户繇逐一勘對頃畝務取相符四至坐落備開現在耕種有無包占欺隱荒蕪坍塌之數邊屯塞卒必先無侵田之害趙充國金城屯田部曲相保為塹壘木樵校聫不絶唐韓重華令沿邊於屯田多處因其地勢立為營堡相其要害廣置樵柵內得安居外難猝攻又彼此相望聲息相聞敵豈能為患逺外之地苦於勢孤則謹烽火布遊兵遇抄掠入境未至之先豫知為備勢可敵則出拒不可敵則斂避百無一失效蒙恬之纍土為山植榆為塞植梨棗柿等樹更妙添數重長城又可為糧倣李允則之為園井列畦隴築短垣倣吳璘之地網平地鑿渠深丈餘連環不斷我疆我理地自為險我鼓我鐸家自為衛矣墾種欲使地無遺利人無留力其道有三一曰用水一曰因土一曰俵牛用水之法濬川疏渠引流設壩建閘設擺其規制在輔臣徐光啓疏中最為詳備今北方之地皆可作水田所以廢置不講者北人習懶故也徐貞明規度水利遼海以東青徐以南鑿鑿可據大抵京東之地山之湧泉溢地而出河之支流等地而平未有如東南轉水於數仞之深者海勢趨於東南嵗多潮患自逺以及青徐有海之潮而鮮潮之患至若中州之地或低窪則圍田之法可行也山東之地多瓦礫則疊耕之制可議也瀕海之地多鹹鹵則支河之説可採也濱湖之地每沮洳則芍陂之迹可求也又如髙燥之區平衍之地天澤不時非旱則潦其效在廣開溝洫先量度地勢之髙下跟尋水所歸宿濬河以受溝之水開溝渠以受潢潦之水官道之衝設大堤以通行偏小之村亦增卑薄以成徑惟於道旁多開溝洫使接續通流水由地中行不占平地又度低窪處多開塘堰以瀦蓄之夏潦之時水歸溝塘亢旱之日可資灌溉髙者麥低者稻平衍地多則木棉桑枲皆得隨宜樹萟土成膏腴地無遺利遍野皆衣食之資矣左光斗曰沿河地方除運河不敢開泄外其餘源流瀦委不一水陂塘堤堰不一用或故迹之可尋或方便之可設工力多者官為量給費少者聽民自舉惟無水之處不得鑿空尋訪斯言深得其要矣何謂因土周禮職方穀宜三種大中祥符時取占城稻三萬斛分給居民擇地髙仰者蒔之內出播種法不擇地可生今皆以稻永樂三年定嵗收屯田籽粒則例每粟穀穈黍大麥蕎穄各二石稻穀薥秫各二石五斗穇稗各三石並各凖米一石小麥芝麻與米同宜令凡新墾之田無論粱菽薏芋蔬菜審從其便不必規規種稻又如邊方果屬不毛即種樹亦可蘇秦言燕雖不佃作而棗栗之利足富於民程琳植雜木數萬曰異時樓櫓可不出於民總期於盡地力而已何謂俵牛考洪武時給天下耕牛共二十五萬五千六百六十四隻仍嵗課孳生數目登報三策畢舉人力既修地利可盡矣一考課明初制屯田衛以指揮提督所以千戶提督都司不時委官督察法本甚詳而武辨自好者少或攬納而恣其狼貪或侵欺而詭於鼠耗後例督屯副使僉事等官及府之管糧廳與州正官之帶徴屯糧者各照民賦例綜核完欠一體參罰功令具在可謂無遺法矣惟在實實舉行耳昔劉定之有言優遊城市而足不歷溝塍慿信簿書而目不按廩實此兩者屯官之大戒也以上皆侯司徒奏議司徒諱恂商邱人侯朝宗諱方域父司徒曰屯田之利人人言之大槩不過兩語在腹裏則屯田少而隱占多宜用清察在塞下則屯田多而耕種少宜用開墾先生曰屯政書甚多最簡要者莫如侯司徒奏議故録其略又曰屯政之書與唐府兵之制相似學者當詳為參酌先生曰學者講理學而不講經濟必流於空虛講經濟而不講理學必流於雜霸講理學者必實實見得萬物皆備於我天下之所當為者無不包含於心性之中講經濟者時時痌瘝在我之身吾心之所欲為者無不措施於日用之際犬成曰顯微無間體用一源説得極親切有味見得心性明無聲無臭之中自具緯地經天之略練得經濟熟旋乾轉坤之道即在一言一動之時一言一動不苟臨大事決大疑方可無差緯地經天做得視無形聽無聲方能無愧心性要在事功上練事功要在心性中出假理學不獨沽名釣譽即實心實意做而非天性之自然亦還是假假經濟不但挾數任術即實心實政行而不達事勢之變化亦還是不真事故有大小心性無大小大經濟不必乘時得位只要時時存濟物之心所以老安少懷隨處可行欲立欲達不必博施濟衆天成曰心性中流出經濟時時足以濟人利萬物一念無私即物與民胞便與天地同量試驗心無私時對山川雲物無不欣然而悅途人異姓無不翕然相親由是讀十三經二十一史自然通貫不然讀盡萬卷書與已何益於人何益如今之人純是一團私心至親骨肉亦視為仇讐讀書俱如説夢先生嘗與學者金廓明諱敞號暗齋年長於湯子三嵗晚年師事湯子萬雲倬茅楚傳輩論為相之道宰相為天下之權衡須心平如衡隨物之輕重定之以權輕重自見故書稱伊尹為阿衡然無星之稱又不能知物之輕重必多讀古書參酌時勢天下之人情物理洞悉於中又積數十年養心之功始能心平如衡每平旦時整衣冠靜坐片時使雜念昏氣消除臨事始能定之以權故伊尹曰先王昧爽丕顯即平旦靜坐除昏氣雜念也伊尹必自如此做工夫故知君之工夫咸有一德學者讀書時便要做箇太平宰相宰相讀書人分內事也故范文正公做秀才時便以天下為己任天之生我原是物與民胞必如西銘視吾君為天地父母視吾民為子弟骨肉天下之事為一已之事凡讀經史百家之書句句要體貼到心上來體驗到事上去一切禮樂政刑制度農田水利邊防屯衛象緯輿圖古人皆有成書如通典通志通考經世八編圖書編水經注俱要博觀尤精要者真西山大學衍義邱瓊山衍義補一日不可去諸案頭常常翻閲體認天下之人情事故自然洞悉於中矣尤要本原上用功一念未起即須存養清其喜怒哀樂之源念頭初動更當省察順其喜怒哀樂之節始能心平如衡杜佑通典馬端臨貴與正文獻通考王圻元翰續文獻通考各省新修通志酈道元水經注顧景范圖書考一百本方輿紀要唐荆川八編宰相告君必以古帝王成法參酌時勢而進之尤須積誠感格自然聽從君若有過緩言幾諫不可訐直造膝密謀謹防竊聽不可泄露善則稱君過則歸已僚友論事從容商酌不執已見不徇人意總歸於當功則讓人失則自認臺諫糾彈和顔聽受言是則從言非不辨薦達賢材不可市德驅除姦佞不可示威物情倉皇鎮之以靜時事倥偬應之以暇羣言混淆決之以理衆心怠惰先之以勤事變未來圖之以豫事勢既至臨之以斷不急近功不規小利立法定制要於可久事定功成斂身以退戒飭子孫習於謙讓論為將之道必本於仁義念念不忍殺人不得已而殺人殺其害於仁義者也即賊冦生發必先撫而後勦誅其渠魁赦其脅從則賊亦易平也然必振其威力能勦而後能撫不然冦心玩忽撫未必從即從復叛漸至蔓延不可為矣故古人云能戰而後能守能守而後能和昔陽明先生征諸山冦必先示諭以恩信句句痛切木石感動受撫者既多負固者亦易殄滅至於寧藩叛亂即速擒之此不待教而誅者也義也使天下安享太平之福者仁也為將必勝之道不外吾夫子臨事而懼好謀而成兩語古之善用兵者多本此揭子宣先生亦云嶽忠武每著著算到敗故能著著皆勝為將要學問兵法精要者備載五經如詩之小戎東山六月采芑江漢常武殷武諸篇書之胤征泰誓易之師卦禮多兵法不獨招搖等制春秋四大戰及他戰伐甚多雖無義戰而實有節制古之名將多讀春秋漢唐以來兵家言無慮數十百種毛氏武備志極詳唐荆川武編尤妙潘龍遊康濟譜將相之道兼備皆當博考參酌時勢而用之為將之道只在知言養氣不動心蘇老泉曰太山崩於前心不驚麋鹿興於左目不瞬兩軍對敵不但生死利害不一毫芥蒂即生平學問一切知謀才略俱要放却惟存一片虛明心體始能集思廣益隨機應變參佐定謀不可使衆人共言一則恐各執已見起爭一則恐泄漏機關敗事一人問答而退再進一人數人議論皆善擇其尤善者用之有善有不善擇其善者從之有功歸之於衆有失責之於己自能深得士心功成身退辭讓勳爵以保子孫論臺諫為朝廷之耳目天下之咽喉識見要廣思議要精凡所言者皆理之所必然事勢之所必至我之才力之所能為愛國愛民勤勤懇懇然後慷慨論列觸犯忌諱而不顧所謂勿欺而犯之者也臺諫要識大體肅官常培國脈養士氣正風俗攻擊巨姦不可吹毛索瘢薦舉賢士不可避嫌小疵整百代之紀綱流萬世之恩澤此大體也臺諫要識幾先圖治於未亂防患於未萌燭隱微警玩忽使姦雄不敢生心敵國不容窺伺豫養君德固結民心使邦本奠於磐石國勢安於泰山此幾先也論舉儒吏古人云官如傳舍吏長子孫俗云清官難逃猾吏手積弊最為難除欲除其弊莫若舉儒吏儒者讀聖賢書必明道理又有出身之階亦不肯貪小利誤逺大前程舉者必察有孝弟忠信之實而有練達時務之才潔清自守之節此西漢所舉孝廉也由郡縣吏可以至三公監司太守聘為功曹待有成效薦之於朝廷學校中有才德兼優之秀才俱可舉選欲科舉者聽其告假以應科舉此吏員也若夫書辦於屢應童子試而未入泮者擇其才幹老成者分班辦事待有成績可考亦薦之使有出身其有才德傑出者不妨保舉於朝以備大用此所謂茂才六部以及各憲大衙門皆如此選舉待之以禮貌礪之以廉耻九年考滿隨其才使之出仕蓋儒吏本有儒生之學又有練達經濟之才不但各衙門積弊可除仕途建豎必有卓卓可紀之勳績矣此科貢吏三途並用之成法且使讀書寒士不得一襟一第者終不至窮餓於荒煙野草中也有勇力者亦當訪求為各衙門效用不使窮餓起為盜賊最要緊論教士取士必先教士士不教而欲取猶不稼而欲穡必不可得之數也古來家國教士之法備矣胡安定蘇湖之法程大夫子上修學校書皆切當可行太學積分之法亦嚴緊實在舉而行之可也然關係最重者在鄉里蒙師養之以正於孝弟謹信愛衆親仁習慣自然於詩書六藝熟讀講究字字躬行即做時文亦句句是坐而言可以起而行者鄉先生日與少年講明理學經濟人材蔚興待國家選而用之可也論取士虞廷敷奏以言明試以功古來取士之法未有不先之以言者今作文者必有實得於心加之以文采始為入彀然必有司之有實學者方能識得不然海底遺珠道旁棄寶掉頭不顧者正多多也且廩生保結同考生互結鄰里甘結皆鄉舉里選之遺意循其名責其實可也然人各有長不必限於一途當如司馬溫公十科取士之法庶幾無遺才乎天成事先生近十年在左右時略有兩載察先生容貌顔色辭氣行止動靜待人接物頗亦得其倣佛迄今數十年精神夢寐間猶覺儼然在也條其一二以告同志先生容貌極端嚴几窗對坐如春山麗日自有以快人心目道路追隨如流水行雲自有以娛人性情顔色極莊雅偶然覿面便覺和氣拂人朝夕侍從不啻霽月朗照晚年充養純粹溫然如玉至今思之猶覺寒冬挾纊蓬室生輝也吐辭酌古凖今是非利害洞悉􅊏毫雖古今極難明事理片言剖決講論經史數萬卷融會於一言一言旁通數萬卷使聞之者眼界頓豁心境洞開而聲氣如宫商迭奏鐘鼓和鳴至今思之猶覺餘音在耳也行則如林雲蔚興止則如磐石奠定動則如春郊起蟄靜則如幽壑潛龍待人不論智愚賢否俱盡至誠人亦待之以誠雖極粗暴者見先生亦自溫和雖極夸詐者對先生不忍妄語化惡為善者不止一人接物無大小輕重必以小心故物無有失先生家不甚貧每年租稅館榖分給宗族戚友之貧者常至絶炊枵腹終日講誦不輟先生嘗曰天地之物無不為我享用目之所見皆是竒觀耳之所聞都是雅樂只要洗滌嗜欲之心自能享用或月夜開忩指示豫曰此蘇子所云造物之無盡藏也急當享用或早晚有暇引豫南望銅官諸山西望西氿諸水舉樂水樂山之義學者心能明理對此波光萬頃碧色連天茭蘆掩映檣帆往來與吾心之理流行不竭者一般豈不可樂試心無私妄望此層巒疊嶂巑岏嵯峨峭壁懸崖樹木蒼翠與吾心之體靜鎮不搖者一般豈不可樂然山雖萬古不移草木年年生長煙雲變化無窮觀吾心未發時生意充滿而無息靜也未嘗不動水雖晝夜長流波瀾蕩漾而常明藻荇縱橫而常潔試驗吾心既發時本體虛靈而不昧動也未嘗不靜先儒所謂動靜一色靜亦定動亦定也今富貴家費萬金做一花園堆山鑿池樹樓築榭歡娛有限何如天地大園不費一錢觀玩無窮吾貧賤人享用豈不逺勝於富貴者哉天成飄泊江湖數十年窮途逆旅勞苦萬狀追念先生此時指點光景愁心頓忘倦力復振凡我同人急須著眼先生與諸同學及世兄允武議論甚多天成從旁聽之默記於心數十餘年終不忍忘然不敢即筆之於書者恐詞拙不能達其精意欲明反晦且以下愚不肖年近七十頑鈍如故有負先生之教不敢出諸口以貽先生羞幸先生遺風尚在宗右人楊鄰筠張岷南蔣若黎許少來瀛選諸子聞風興起問先生之遺訓於豫不得已條其大概詞不達意望諸君子略其詞以深思其意康熙六十年辛丑孟夏受業不肖門人潘天成謹述雜記訓言後乙卯春問治平之要先生曰正士風士風正則經史之用實在家父子兄弟夫婦之恩洽在朝君臣僚友之義盡天下無不治矣正士風固在國家建學設科而其要尤在鄉里蒙師教小學生今汝已為蒙師矣不可徒受些須束修忘其責任之重也試觀古今來聖賢豪傑名公巨卿孰非出於小學生乎人性皆善小學生孰不可聖賢豪傑名公巨卿者乎况嗜欲未開真性未喪其教易入易曰蒙以養正聖功也特蒙師不善教之耳凡為師者必自盡孝弟忠信之道為宗族鄉黨推重小學生聞之必起欣慕正身以立師範視聽言笑不敢茍且行止動靜不敢輕浮小學生見之必生敬畏當句讀時必粗為之訓解使其易知也由粗漸可以及精孝弟忠信家常日用本於天性粗即精也試觀學生之父一來館中學生必欣然喜先生當指而訓之曰此爾之孝也天性也再看有長輩來館中小學生見之必肅然起先生指而訓之曰此爾之弟也天性也小學生嬉戲時一見先生必惕然收斂先生益自嚴肅以深學生之敬心學生歸去必教他孝順父母和睦兄弟姊妹寬待婢僕養其仁愛之心一事不常一言不實必婉轉訓戒先生尤嚴自反一言一事不欺學生學生方能不欺孟母買鄰肉以啖孟子所以為善教也日日如此學生天性日開嗜欲無由而起即後來或起而先入之言不忘於中自知悔改所謂少成若天性習慣如自然矣學生稍長與之講解經書先生必句句向自己身心上體認親切於學生身心上指點親切蓋聖賢道理不外吾之身心故從身心上體認指點方得真知灼見即做文字亦得神得理可以坐而言起而行不徒為無用之空文也自家之身心見得真天下萬世人之身心亦無不知矣學生大成達而在上致君澤民可以治一時之天下窮而在下師友傳習可以治萬世之天下吾故曰治天下之要在正士風正士風之要尤在蒙師也今汝已為師矣勉之勉之又曰凡有朋友來館中切不可間談説笑一則曠職一則起學生慢心必與之討論經史切究心性或商酌經濟時務學生聞之開發神知彼此有益又曰朝廷立學設科不得不以爵祿勸善士之為善未嘗有求爵祿之心也此在唐虞三代之政則然浸淫至於末季則不然矣故孟子曰古之人修其天爵而人爵從之今之人修其天爵以要人爵既得人爵而棄其天爵是朝廷以三物為教三年賓興不適足啓人勢利之心也哉此君師之權不得不分也故天生孔子為萬世師以布衣而操繼天立極之權非有髙爵以榮人厚祿以養人七十子心悅誠服三千之徒仰髙山而行景行者皆由於天性之不容已非有勢利之念參於其中也漢唐以來真儒輩出教養人材為朝廷之用是先絶其勢利之心而得髙爵厚祿之享勳名節義朝廷得養士尊賢之報君師之權分君師之權所以合也凡為人師者可不知其責任之重也哉庚子十月二十日至許一清兄家夜睡小樓夢見先業師默齋湯先生形容如舊更覺少壯精彩炳麟命余講大學聖經一章畢先生曰説亦良是但注中虛靈不昧一句體認得真否對曰體認頗真先生大怒以長大紅色竹板責五下跪受而起先生曰不但聲色貨利纍心不虛冨貴功名動心不虛聰明才智自恃不虛即數十年讀書學問執著亦不虛須一切放下使此心如太虛微雲不起如明鏡纎塵不染始能隨感而應朋友議論間才能集思廣益日用應事才能因時制宜即遇錯節盤根亦能隨機利導衆理之具者庶幾不失萬事之應者或不至大誤矣勉之勉之感泣而醒淚流枕席時漏下四聲矣噫吾自十九嵗春三月從事先生二十九嵗春三月先生棄我我今年六十有七矣四十餘年在天之靈猶惓惓於我責之勉之比當年更切奈我不肖辜負先生慙懼無極趂此餘年鞭策駑駘刻刻警醒未審果能不負先生否謹録以告同志大家勉勵刻刻在獨知處體認庶幾有以慰在天之靈也哉湯子四願即用橫渠先生語一願為天地立心一願為生民立命一願為千聖繼絶學一願為萬世開太平湯子四戒一戒鄙夫之患得患失一戒鄉原之同流合汙一戒楚狂沮溺果於忘世一戒自暴自棄怠緩失時鐵廬集卷一
